# ARIA 配置文件
# 修改后重启 main.py 生效

# ── 感知层 ──────────────────────────────────────────────────
perception:
  hotkey: "ctrl+`"             # 全局热键，按住录音，松开识别
                               # 也可以改成 "ctrl+home" 或鼠标侧键如 "mouse4"
  whisper_model: "base"        # tiny(最快) / base / small / medium(最准)
  whisper_language: "zh"       # 中文优先；说英文也能识别
  mic_device_index: -1         # -1 = 系统默认麦克风
  silence_timeout: 1.5         # 静音超过 N 秒自动停止录音

# ── 意图层（LLM）────────────────────────────────────────────
intent:
  provider: "openai"           # openai / local（两家都兼容 OpenAI 格式）

  # 意图解析：DeepSeek V3（便宜，中文强）
  model: "deepseek-chat"
  api_key: ""                  # 留空则读环境变量 ARIA_INTENT_KEY
  base_url: "https://api.deepseek.com/v1"

  # 视觉分析：GLM-4V-Flash（免费额度，有视觉）
  vision_model: "glm-4v-flash"
  vision_api_key: ""           # 留空则读环境变量 ARIA_VISION_KEY
  vision_base_url: "https://open.bigmodel.cn/api/paas/v4"

# ── Action 模块 ──────────────────────────────────────────────
actions:

  archive:
    enabled: true
    obsidian_vault: "D:/AIproject/aria-vault"   # 新建的独立 vault
    target_folder: "captures"                   # vault 内的归档文件夹

  answer:
    enabled: true              # 看截图回答问题

  chat:
    enabled: true              # 纯对话

  capture:
    enabled: false             # Phase 1 不用，截图由 perception 直接处理

  convert:
    enabled: false             # Phase 2（视频→GIF，需 ffmpeg + 录屏方案确定后启用）

# ── Identity 模块 ────────────────────────────────────────────
identity:

  persona:
    name: "Aria"
    personality: |
      你是 Aria，一个陪伴型 AI 助手。
      说话简洁自然，像朋友一样交流，不用敬语。
      回复控制在 1-2 句话，除非用户要求更多。
      用户在玩游戏或专注工作时，你的回应要简短有力，不打扰节奏。
    memory_file: "data/aria_memory.json"

  voice:
    enabled: true
    engine: "edge-tts"                    # edge-tts（免费）/ openai
    edge_voice: "zh-CN-XiaoxiaoNeural"    # 中文女声；其他选项见 edge-tts 文档
    rate: "+0%"
    volume: "+0%"

  avatar:
    enabled: false             # Phase 3
