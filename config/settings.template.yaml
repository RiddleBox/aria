# ARIA 配置模板
# 复制为 settings.yaml 并填入真实值
# settings.yaml 已加入 .gitignore，不会上传到 git

identity:
  name: "ARIA"
  persona:
    personality: |
      你是 ARIA（AI Runtime Interface Agent），一个陪伴玩家的 AI 助手。
      性格：简洁、直接、略带个性，不用敬语，不废话。
      回复控制在 1-2 句话，像在和朋友聊天。

intent:
  provider: "openai"  # 兼容 OpenAI 格式

  # 意图解析模型（推荐 GLM-4-Flash，免费）
  model: "glm-4-flash"
  api_key: ""          # 填入智谱 key，或设环境变量 ARIA_INTENT_KEY
  base_url: "https://open.bigmodel.cn/api/paas/v4"

  # 视觉分析模型（推荐 GLM-4V-Flash，免费，支持图片）
  vision_model: "glm-4v-flash"
  vision_api_key: ""   # 留空则和 api_key 相同
  vision_base_url: "https://open.bigmodel.cn/api/paas/v4"

  # 视觉优化参数
  vision_optimization:
    max_width: 1280
    max_height: 720
    jpeg_quality: 75

speech:
  # 语音识别（Whisper）
  whisper_model: "base"      # tiny / base / small / medium（越大越准，越慢）
  hotkey: "ctrl+`"           # 按住说话

  # 初始提示词：帮助 Whisper 识别你常用的词
  # 按你的使用场景修改，加入你常说的词语，识别准确率会明显提升
  # 例如游戏场景可以加：英雄、技能、大招、倒计时、击杀等
  whisper_initial_prompt: "这是一段中文语音指令，用于办公和日常辅助场景。内容可能包含：截图、录屏、分析、提醒、番茄钟、帮我看、归档、ARIA、记录、总结、查一下等词语。"

  # 背景噪音过滤（如麦克风环境嘈杂可开启，但可能误过滤人声，建议先关闭）
  whisper_vad_filter: false

  # TTS（edge-tts）
  tts_voice: "zh-CN-XiaoxiaoNeural"  # 中文女声
  # 其他可选：zh-CN-YunxiNeural（男声）、zh-CN-XiaoyiNeural（女声）

actions:
  capture:
    enabled: true
    output_dir: "data/captures"

  archive:
    enabled: true
    vault_dir: "data/vault"

  convert:
    enabled: false  # GIF 转换，需要 ffmpeg
